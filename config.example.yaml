# ============================================================
# Jira Bug Dashboard — 个人配置
# ============================================================
# 复制到: ~/.claude/skills/jira-bug-dashboard/config.yaml
# 然后修改下面标注 <...> 的部分
# ============================================================

# === 个人信息 ===
user:
  name: "<你的名字>"
  email: "<你的邮箱>@mercedes-benz.com"

# === Jira 连接 ===
jira:
  base_url: "https://mercedes-benz.atlassian.net"
  api_token_env: "JIRA_API_TOKEN"    # 环境变量名，token 存在 ~/.zshrc 里

# === Ticket 筛选（最重要！） ===
# 把你在 Jira Advanced Search 里确认好的 JQL 粘贴到这里
filter:
  jql: |
    labels in ("<your_label_1>", "<your_label_2>")
    AND status not in (Closed, Done, Resolved)

# === 分类规则 ===
triage:
  new_ticket_days: 3       # 近 N 天创建的算"新建"
  stale_days: 3            # 超过 N 天没更新的算"需催"
  focus_statuses:          # 需要你主动管理的状态
    - "Open"
    - "To Do"
    - "In Progress"
  non_focus_statuses:      # 在流转中、不需要你操作的状态
    - "To Verify"
    - "Verifying"
    - "MR-Review"
    - "PO Review"
    - "Fixed"
    - "Rejected"
    - "Cancelled"
    - "In Verification"

# === 自定义字段（可选） ===
fields:
  severity_field: "customfield_10037"    # 严重度字段 ID，不确定可设为 null
  a_level_field: "customfield_11451"     # A-level 字段 ID，不确定可设为 null

# === 输出 ===
output:
  directory: "~/loop-outputs/jira-triage"
  filename_pattern: "{date}-BUG.html"
  open_in_browser: true
